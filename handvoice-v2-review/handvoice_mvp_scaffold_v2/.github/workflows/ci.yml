name: HandVoice verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check services pipelines tests migrations
      - name: Verify clean-database migration
        run: HANDVOICE_DATABASE_URL=sqlite:///./ci_migration.db alembic upgrade head
      - name: Test backend and measurement pipeline
        run: pytest
      - name: Run synthetic engineering validation
        run: python scripts/run_synthetic_validation.py

  capture-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/capture-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/capture-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Browser journey
        run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handvoice-playwright-evidence
          path: apps/capture-web/e2e/artifacts
          if-no-files-found: ignore
          retention-days: 14

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build test image
        run: docker build --target test -f infrastructure/docker/api.Dockerfile .
